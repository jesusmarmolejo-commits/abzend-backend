name: ABZEND Daily Backup

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install googleapis@144

      - name: Run backup
        id: backup
        run: node .github/scripts/backup.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

      - name: Notify success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFICATION_EMAIL }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "ABZEND Backup exitoso - ${{ steps.backup.outputs.date }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ABZEND Backup
          body: |
            Backup completado exitosamente.
            Fecha: ${{ steps.backup.outputs.date }}
            Archivos subidos: ${{ steps.backup.outputs.files_count }}

      - name: Notify failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFICATION_EMAIL }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "ABZEND Backup FALLIDO - intento 1/3"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ABZEND Backup
          body: |
            El backup falló en el primer intento. Se reintentará automáticamente.
            Revisa los logs: https://github.com/jesusmarmolejo-commits/abzend-backend/actions

  retry-backup:
    needs: backup
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Wait 5 minutes
        run: sleep 300

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install googleapis@144

      - name: Retry backup
        run: node .github/scripts/backup.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

  retry-backup-2:
    needs: retry-backup
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Wait 5 minutes
        run: sleep 300

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install googleapis@144

      - name: Retry backup final
        run: node .github/scripts/backup.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

      - name: Notify final failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFICATION_EMAIL }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "ABZEND Backup FALLIDO - 3 intentos agotados"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ABZEND Backup
          body: |
            El backup falló después de 3 intentos. Requiere atención manual.
            https://github.com/jesusmarmolejo-commits/abzend-backend/actions